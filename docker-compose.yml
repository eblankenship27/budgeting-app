services:
  postgres:
    image: postgres:16-alpine
    container_name: budgeting-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: budgeting
      POSTGRES_PASSWORD: budgeting
      POSTGRES_DB: budgeting_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U budgeting -d budgeting_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
